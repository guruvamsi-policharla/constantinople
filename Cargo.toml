[workspace.package]
edition = "2024"
license = "MIT"
rust-version = "1.88"
authors = ["commonware"]
homepage = "https://commonware.xyz"
repository = "https://github.com/commonwarexyz/constantinople"
keywords = ["configuration", "traits", "generics"]
categories = []
exclude = ["**/target"]

[workspace]
resolver = "2"
members = [
  "crates/application",
  "crates/engine",
  "crates/explorer-crypto",
  "crates/indexer",
  "crates/mempool",
  "crates/primitives",
  "bin/deploy",
  "bin/relayer",
  "bin/spammer",
  "bin/validator",
]

[workspace.lints.rust]
unused-must-use = "deny"
rust-2018-idioms = "deny"

[workspace.lints.rustdoc]
all = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
missing-const-for-fn = "warn"
use-self = "warn"
option-if-let-else = "warn"
redundant-clone = "warn"

[workspace.dependencies]
# Workspace
constantinople-engine = { path = "crates/engine" }
constantinople-indexer = { path = "crates/indexer" }
constantinople-mempool = { path = "crates/mempool" }
constantinople-primitives = { path = "crates/primitives" }
constantinople-application = { path = "crates/application" }

# Commonware
commonware-p2p = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-glue = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-math = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-codec = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-formatting = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-utils = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-coding = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-macros = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-runtime = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-storage = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-deployer = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-parallel = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-resolver = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-broadcast = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-consensus = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue" }
commonware-cryptography = { git = "https://github.com/commonwarexyz/monorepo.git", branch = "cl/glue", default-features = false }

# Exoware
exoware-sdk = "2026.4.1"
exoware-simulator = "2026.4.1"
exoware-sql = "2026.4.1"
datafusion = "52"

# Other
axum = "0.8"
clap = { version = "4", default-features = false }
rand = { version = "0.8.5", default-features = false }
bytes = { version = "1.11.1", default-features = false }
criterion = "0.7.0"
rayon = "1.10"
serde = { version = "1.0.228", default-features = false }
tokio = { version = "1.50", default-features = false }
tower = { version = "0.5", default-features = false }
rstest = "0.26.0"
futures = { version = "0.3.31", default-features = false }
tracing = { version = "0.1.41", default-features = false }
arbitrary = { version = "1.4.2", features = ["derive"] }
hashbrown = { version = "0.17.0", default-features = false }
rand_core = "0.6.4"
reqwest = { version = "0.12", default-features = false }
thiserror = { version = "2.0.18", default-features = false }
serde_json = { version = "1.0.149", default-features = false }
serde_yaml = "0.9"
derive_more = { version = "2.1.1", default-features = false }
prometheus-client = { version = "0.24.0", default-features = false }
tracing-subscriber = "0.3"

[profile.samply]
inherits = "release"
debug = true
