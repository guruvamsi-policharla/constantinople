[package]
name = "constantinople-spammer"
description = "Transaction spammer for Constantinople"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
constantinople-primitives.workspace = true

commonware-codec.workspace = true
commonware-cryptography = { workspace = true, features = ["std"] }
commonware-deployer.workspace = true
commonware-utils.workspace = true

bytes.workspace = true
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["rustls-tls", "json"], default-features = false }
serde = { workspace = true, features = ["derive", "std"] }
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
