[package]
name = "constantinople-spammer"
description = "Spam bot for Constantinople load testing"
version = "0.0.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
# Workspace
constantinople-primitives.workspace = true
constantinople-mempool.workspace = true

# Commonware
commonware-codec.workspace = true
commonware-cryptography = { workspace = true, features = ["std", "sha2-asm"] }
commonware-deployer.workspace = true
commonware-formatting.workspace = true
commonware-parallel.workspace = true
commonware-privacy.workspace = true
commonware-runtime.workspace = true
commonware-utils.workspace = true

# Other
clap = { workspace = true, features = ["derive", "std"] }
bytes.workspace = true
futures = { workspace = true, features = ["std"] }
rand.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["full"] }
tracing.workspace = true
serde_yaml.workspace = true
reqwest.workspace = true

[features]
# Generate transfer proofs with the simulator trapdoor instead of real proving.
# Requires the simulator backend in constantinople-primitives.
privacy-backend-simulator = ["constantinople-primitives/privacy-backend-simulator"]

[[bin]]
name = "constantinople-spammer"
path = "src/main.rs"
