[package]
name = "constantinople-validator"
description = "Constantinople validator binary"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
constantinople-engine.workspace = true
constantinople-application.workspace = true
constantinople-mempool = { workspace = true, features = ["mocks", "server"] }
constantinople-primitives.workspace = true

commonware-codec.workspace = true
commonware-consensus.workspace = true
commonware-cryptography = { workspace = true, features = ["std"] }
commonware-glue.workspace = true
commonware-math = { workspace = true, features = ["std"] }
commonware-p2p.workspace = true
commonware-parallel = { workspace = true, features = ["std"] }
commonware-runtime.workspace = true
commonware-utils.workspace = true

axum = "0.8"
bytes.workspace = true
clap = { version = "4", features = ["derive"] }
futures.workspace = true
rand.workspace = true
serde = { workspace = true, features = ["derive", "std"] }
toml = "0.8"
tracing.workspace = true
tracing-subscriber = "0.3"
tokio = { version = "1.50", features = ["full"] }

[[bin]]
name = "constantinople"
path = "src/main.rs"
