[package]
name = "constantinople-validator"
description = "Constantinople validator binary"
version = "0.0.0"
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
# Workspace
constantinople-engine.workspace = true
constantinople-indexer.workspace = true
constantinople-mempool.workspace = true
constantinople-primitives.workspace = true
constantinople-application.workspace = true

# Commonware
commonware-actor.workspace = true
commonware-p2p.workspace = true
commonware-glue.workspace = true
commonware-codec.workspace = true
commonware-formatting.workspace = true
commonware-utils.workspace = true
commonware-macros.workspace = true
commonware-runtime.workspace = true
commonware-deployer.workspace = true
commonware-parallel.workspace = true
commonware-consensus.workspace = true
commonware-storage.workspace = true
commonware-cryptography = { workspace = true, features = ["std", "sha2-asm"] }

# Other
ahash.workspace = true
axum.workspace = true
clap = { workspace = true, features = ["derive", "std"] }
bytes.workspace = true
reqwest.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["full"] }
tower-http = { version = "0.6", features = ["cors"] }
tracing.workspace = true
rand_core.workspace = true
serde_yaml.workspace = true
tracing-subscriber.workspace = true
futures.workspace = true

[dev-dependencies]
# Other
tower = { workspace = true, features = ["util"] }

[[bin]]
name = "constantinople"
path = "src/main.rs"
