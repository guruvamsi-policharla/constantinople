[package]
name = "constantinople-mempool"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
constantinople-primitives.workspace = true

commonware-consensus.workspace = true
commonware-cryptography.workspace = true

# server feature deps
commonware-codec = { workspace = true, optional = true }
commonware-utils = { workspace = true, optional = true }
axum = { version = "0.8", optional = true }
serde = { workspace = true, features = ["derive", "std"], optional = true }
serde_json = { version = "1", optional = true }
tokio = { version = "1", features = ["sync", "time"], optional = true }
tracing = { workspace = true, optional = true }

[features]
default = []
std = [
	"commonware-cryptography/std"
]
mocks = [
	"commonware-consensus/mocks",
	"commonware-cryptography/mocks"
]
server = [
	"std",
	"dep:commonware-codec",
	"dep:commonware-utils",
	"dep:axum",
	"dep:serde",
	"dep:serde_json",
	"dep:tokio",
	"dep:tracing",
]

[dev-dependencies]
bytes.workspace = true
commonware-cryptography = { workspace = true, features = ["std"] }
commonware-math = { workspace = true, features = ["std"] }
commonware-utils = { workspace = true, features = ["std"] }
futures = { workspace = true, features = ["std", "executor"] }
rand.workspace = true
